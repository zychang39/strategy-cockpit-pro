# GitHub Pages 部署：build 前端 + 打包 data/
name: deploy-pages
on:
  push:
    branches: [main]
    paths: ["web/**", "data/**", "config/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: build web
        run: |
          mkdir -p web/public/data/history web/public/data/quotes
          cp data/latest.json data/config.json web/public/data/ || echo "no data yet"
          cp data/history/*.json web/public/data/history/ 2>/dev/null || true
          cp data/quotes/*.json web/public/data/quotes/ 2>/dev/null || true
          cd web
          npm ci || npm install
          npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
