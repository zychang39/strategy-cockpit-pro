# 全域參數 — 皆可調
margin:
  tw_rate: 0.065            # 台股融資年利率
  us_rate: 0.07             # 美股 margin 年利率
  tw_initial: 0.4           # 台股融資自備款比例（融資六成）
  tw_maintenance_alert: 1.3 # 台股維持率警戒線 130%
  us_maintenance: 0.3       # 美股維持保證金 30%

leverage_cap_default: 1.3   # 槓桿原則：僅站上 30MA（進攻）才動用，上限 1.3×。
                            # 1.8× 在本框架無支持理由，滑桿仍可調到 1.8 供壓力測試。

leaps:
  symbols: [GOOGL, AMZN, NVDA, MU, TER, AVGO]  # 僅這些提供方案 B
  min_months: 9
  max_months: 15
  delta_low: 0.75
  delta_high: 0.85
  strike_ratio: 0.8         # 建議履約價 ≈ 現價 × 0.8

mc:                          # 情境模擬預設
  paths: 10000
  prob: {bull: 0.35, base: 0.40, bear: 0.25}
  dist:                      # 未槓桿兩年報酬 N(mu, sigma)
    bull: {mu: 0.70, sigma: 0.20}
    base: {mu: 0.25, sigma: 0.12}
    bear: {mu: -0.22, sigma: 0.10}
  gap_prob: 0.25             # 熊市內跳空事件機率
  gap_size: -0.10
  cost_per_year: 0.02        # 融資成本 2%/年 × 借款比

targets_multipliers:         # §3.1 初始目標價之主題倍數（base = 現價 × 倍數）
  memory_hdd: 1.4
  mlcc: 1.35
  equipment: 1.25
  google_chain: 1.5
  csp: 1.3
  cpo: 1.5
  bb: 1.8
  default: 1.2
