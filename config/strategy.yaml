split:
  title: 美股 / 台股比例
  body: 覆蓋清單以美股為主，主要論述（HDD、Teradyne、Google 鏈、BlackBerry）都在美股——合理分法：美股 60–70%、台股/日股 30–40%（台股集中 2454、6187、6223、2327、2330 與設備；日股 Murata、Kioxia 用複委託）。
leverage:
  title: 槓桿原則
  quote: 「槓桿就是一個工具…問題在於人們不知道自己的風險承受度。」「如果回檔讓你有壓力，我建議不要。」
  body: 只在站上 30MA、滿倉 90–100% 階段動用；跌破 30MA 先降槓桿到 1.0 再降現股。資金規模原話：「100 萬美金應該可以降到兩倍……1.6、1.8 倍左右。如果是我來做」——但他同場自承早期大槓桿活下來「是倖存者偏差」。本系統預設 1.3×，1.5–1.8× 僅供壓測。單一個股持股比率過高是另一風險：「資金大則暫時不建議」單壓。
philosophy:
  title: 選股與資訊判讀
  rules:
    - Buy side 三要素：基本面好不好、催化劑什麼時候（「兩三季後太遠了，我先不買」）、能否成為共識（「你自己看好沒用」）。
    - 估值＝藝術、EPS＝模型：「DCF 不是估值，是驗證」；懶惰法——EPS 成長 30% 給 30 倍。sell side 給 LITE 50 倍、作者給 35 倍——「公說公有理」。
    - 管理層說法要打折：「最初級的研究員就是聽管理層說什麼就信什麼」；技術部落格「都是垃圾」，看實際產品導入。
    - 看分析師先看名字不看券商；用彭博終端機數字當共識，不拿新聞當共識；點陣圖是噪音。
    - 書單：《超級績效》（右側交易，「影響我這輩子」）、《投機者的告白》（估值與市場情緒）。
exits:
  title: 持股週期與退出
  rules:
    - 主線（記憶體、MLCC、設備、HDD、Google 鏈）：12–24 個月，「論述是否改變＋均線」雙重退出——channel check 顯示缺口收窄（如 MLCC 從 2,400 億顆縮到 1,000 億顆）就走，不等破線。
    - 事件型（TER 財報回檔、MLCC 擴產宣布）：3–9 個月。
    - CSP：觸發檢查點才進，持有到折舊紅利兌現（2027–28）。
    - 估值紀律：「估值變便宜了，我一定會先去看為什麼估值變便宜…現在假設 15 倍很便宜，我反而不敢買。」
risk:
  title: 風險提醒
  body: 整套策略高度依賴單一分析師 channel check（CAPEX +30% vs 彭博共識 12%、TPU 1,000 萬顆、HDD 缺口 30%、Rubin MLCC 用量 100 萬顆——他自己標註其他渠道有 70–80 萬的版本）。作者自承：「我很常是韭菜王，說不定我錯」「我們很爛，賣不在高點」「多空自有判斷」。把數字當假設，每季財報驗證——最早證偽點：2027 年初 CSP CAPEX 指引、TER CPO 出貨。
