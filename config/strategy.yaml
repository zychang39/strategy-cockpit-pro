# 策略頁內容 — 三條紀律 × 四階段佈局 × 槓桿 × 退出（Allen 直播論述整理）
# 「」內為作者原話。所有調研數字非公開共識，當假設用、每季財報驗證。
disciplines:
  - title: 倉位由均線決定，破線就砍
    quote: 「我個人不會頭鐵，破線就砍掉，破線就降倉位。」「60MA 加到 80%，30MA 以上做 90% 到 100% 滿倉水位。」
    body: 站上 30MA → 90–100%；跌破 30MA → 降到約 80%；跌破 60MA → 再降。「我不太會因為牛熊市調整這個紀律」。唯一例外：兩條均線距離 <5% 時不一次砍 40%，改砍 20–30%——「若彈回來要加回來，中間耗損太大」。
  - title: 大盤觸發：QQQ 破 30MA → 現金 +20%；站回才加回
    quote: 「QQQ 跌破 30 日均線，我們可能把 20% 的現金拿回來。」「若第二個交易日尾盤沒有跌破，就會加回來。」
    body: 賣誰？「一定是線型最弱……如果有股票跌到 120MA，那就是你砍太慢了。」還在 30MA 上的不動它——汰弱留強、尊重市場。加回條件嚴格：站回 30MA 且第二個交易日尾盤守住。
  - title: 個股減倉樓梯（獲利保護）
    quote: 「假設這一檔買最多買總資產的 10%，破了 30MA 就減到 8%，再破 60MA 減到 6%，再不好就砍掉。」「我砍股票沒什麼情緒，該賣就賣。」
    body: 獲利保護只有一招——破線砍。Lumentum 實例：破 30MA、60MA 後仍是持股中最弱 →「我絕對會清掉，我已經清掉了」，即使賣的位置不好（800–900）。右側交易：大部位絕不左側，「小部位可以做左側」。
  - title: 最重要的資金輪動檢查點：費半 vs QQQ
    quote: 「假設費半跌破 30 日均線，但 QQQ 未跌破，市場是否在用股價投票？」「我是很認真的跟你講，CSP 的現金流有可能會復甦。」
    body: 觸發成立 → 從半導體供應鏈搬部分資金回 CSP（點名 Google、Amazon、NVIDIA）。邏輯：2023 年買的 H 系列伺服器 2027–28 折舊到期；CAPEX YoY（抓 30%）低於 RPO YoY 時營業現金流轉正。
  - title: 大宗商品的玩法：賭擴產時點，不是賭漲價
    quote: 「先漲價，漲到客戶受不了，才會擴產。」「漲價多輪後擴產，P 和 Q 都拉高，營收噴出。」
    body: MLCC、DRAM、NAND、HDD 全適用。真正的爆發是擴產宣布（P×Q 齊升、新產能用新價格賣）；MLCC 擴產判斷 ~2027 年底。配套鐵律——margin cycle 大於估值：「margin peaking 我管你估值怎樣」（MU 毛利 85% 下滑即出場；Broadcom 就是 margin peaking）。
  - title: 估值紀律：便宜是警訊，不是機會
    quote: 「估值變便宜了，我一定會先去看為什麼。」「大盤歷史新高，有東西超便宜，我反而不敢買。」
    body: 修正 10–20% 可忽略；「無故」便宜 30–40% ＝基本面或路數可能變了。下跌時 channel check 從一季一次加密到一週多次。絕對不買 TAM 縮小的公司——「可賣的客戶變少、單價變低，你會好到哪？」
stages:
  - id: 1
    name: 階段①
    period: 2026-07-03 ～ 2026-09-30（本季）
    start: 2026-07-03
    end: 2026-09-30
    entry_signal: 現在——依作者自揭持倉直接建立
    transition:
      to: 階段②（2026-10-01 起）
      watch: 台積電 Q3 財報 CAPEX 指引（~10月中）、TER Q3 財報（~10月底）、LITE/COHR 回檔幅度
      actions:
        - 「TER 財報弱勢」出現 → 動用 5% 現金分批建倉 TER（目標 12%）
        - LITE 回到估值錨下緣（EPS $30×35 倍以下） → 回補光通訊（目標 12%）
        - 記憶體 30→25%、MLCC 20→18%、設備 18→15%：獲利部位等比減碼騰出資金，不砍論述最強的 HDD
        - 若期間出現輪動訊號（SOX破30MA、QQQ未破） → 提前啟用 CSP 觸發倉（GOOGL/AMZN 13%）
    summary: 以作者自揭持倉為藍本：記憶體 ~30%、MLCC ~20%、設備 15–20%、其他。
    plays:
      - title: 記憶體 ~30%
        tickers: [MU, SNDK, STX, WDC, KXIAY]
        body: HDD 是最強調的「最大預期差」——供需缺口約 30%、報價 $25/TB vs 賣方預期 $20、PE 約 10 倍。DRAM/NAND 在 LTA 天花板內連續調漲。
      - title: MLCC ~20%
        tickers: [MRAAY, 2327.TW]
        body: Rubin 單櫃用量約 100 萬顆（GB300 的兩倍多）；Murata 2027 年 25 倍「算中性」。
      - title: 設備 15–20%
        tickers: [AMAT, ONTO, ASML, UCTT, KLIC, 2330.TW]
        body: 台積電下半年可能上修 CAPEX（三年合計 2,200 億美元）；三星、Intel 需求還沒進模型＝上修空間。
      - title: 其他
        tickers: [GLW, INTC, WOLF]
        body: GLW 看光纖不看玻璃橋；WOLF 功率半導體觀察倉。
    avoid: 「Teradyne 下半年財報可能不理想…投資人可能對財報感到不適，需先做好心理準備」——財報回檔反而是佈局點。光通訊已破線砍掉（Lumentum、Nokia），先不追。
  - id: 2
    name: 階段②
    period: 2026-10-01 ～ 2027-03-31
    start: 2026-10-01
    end: 2027-03-31
    entry_signal: TER/台積電 Q3 財報公布後啟動換倉
    transition:
      to: 階段③（2027-04-01 起）
      watch: 2027 年初五大 CSP CAPEX 指引（最早證偽點①）、TER CPO 出貨口徑（證偽點②）、TPU 出貨進度
      actions:
        - CSP CAPEX 指引 ≥ +25% 驗證 → 加碼 Google TPU 鏈至 28%（2454 為台股主軸、MRVL/ALAB 分批）
        - CSP CAPEX 指引令人失望（<15%） → 檢查點①切「證偽」：全站 −20pp、槓桿鎖 1.0
        - 記憶體 25→15% 轉收割模式：只留 MU/STX/SNDK，WDC 獲利了結
        - CPO 測試/封裝建倉（TER 續抱 + AMKR/6187/6223 合計 16%）
        - CSP 觸發倉轉常設 18%（GOOGL/AMZN/NVDA）
    summary: 回補光通訊、TER 逢財報弱勢建倉、CSP 檢查點武裝待發。
    plays:
      - title: 回補光通訊
        tickers: [LITE, COHR]
        body: 「下半年我傾向找時機買回。」LITE 估值錨：EPS $30 × 35 倍 ≈ $1,000+，回檔到估值合理再接。
      - title: Teradyne 逢財報弱勢建倉
        tickers: [TER]
        body: 2027 三條主線——WLT T2 CPO 測試機今年 70 台→明年 200 台；Rubin GPU 測試搶 Advantest 份額（10%→兩三年 30%）；Google/MTK 新客戶。2027 EPS $10–11 且「上修 10–15% 合理」。
      - title: CSP 檢查點啟動
        tickers: [GOOGL, AMZN]
        body: 一旦費半破 30MA 而 QQQ 沒破 → 加 GOOGL、AMZN（「我可能會回去買」）。
  - id: 3
    name: 階段③
    period: 2027-04-01 ～ 2027-12-31
    start: 2027-04-01
    end: 2027-12-31
    entry_signal: 2027 年初 CSP CAPEX 指引驗證後全面換至 Google 鏈主軸
    transition:
      to: 階段④（2028-01-01 起）
      watch: MLCC 擴產宣布（判斷 2027 年底）、BB/Thor 量產驗證證據（2027 H2）、光引擎放量口徑
      actions:
