  IFNNY:
    buy: 作者原有功率部位（「我原本就有英飛凌在功率半導體元件的份額裡面」；想買安森美但台達鏈裡沒看到）
    why: 台達 SiC 市佔 90%、800V HVDC 首選廠商；美股 HVDC 二選一之一（另一是 WOLF）
    upside: HVDC 2028 滲透 10–20% 的最大份額者
    risk: 份額 90→70 讓給 Wolf 的稀釋；歐股 ADR 流動性
  PANW:
    buy: 資安基建——作者點名的唯一軟體方向（避開應用層）
    why: 收購 CyberArk 後平台化；「Agentic AI 需要資安控制中樞」「資金是真的在做事，基本面向上」
    upside: 平台化是資安趨勢
