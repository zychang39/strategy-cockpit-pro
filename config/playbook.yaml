avoid:
- t: PLTR
  why: 估值過高——「基本面不錯，但估值昂貴，暫時不接近」
- t: CRWV / NeoCloud
  why: 「neocloud 競爭激烈」——彼此間與新進者競爭都大
- t: AXTI
  why: 「將資金押在政治風險上很危險」——替代：LITE/COHR（與日系基板合作）
- t: ON 安森美
  why: 「我會選 STM」——台達供應鏈裡沒看到安森美
- t: 應用層軟體（ADBE/CRM）
  why: 「容易被 AI 新創競爭」——只碰資安/AI 基建
- t: 台股 HVDC（台達電等）
  why: 「市場都猜得很清楚了」——雖認同台達最穩
- t: AVGO
  why: 「Broadcom 就是 margin peaking」「CPO 最大受惠者？絕對不是」——非不能持有，是點出風險
- t: AAPL
  why: 「不看好 iPhone 銷量」但認同管理層決策
- t: VRT
  why: 400V/800V 競爭力不強——份額傾斜到 Delta（尤其 Google 單）
- t: 黃金（短線）
  why: 「今年若不降息，對金價完全是壓力」——等升息預期 overshoot 回歸
