triggers:
- id: qqq_break
  when: QQQ 跌破 30 日均線（大盤觸發）
  action: 拉高現金 20%；先砍「線型最弱」的持股（跌到 120MA＝砍太慢）。加回條件：QQQ 站回 30MA 且第二個交易日尾盤守住
  tickers: []
  auto: qqq_break
  window: 隨時
  note: 「QQQ 跌破 30 日均線，我們可能把 20% 的現金拿回來」「先砍弱的，尊重市場……汰弱留強」。同破（費半+QQQ）時不需特別看 CSP，照此紀律減倉即可。
- id: stock_ladder
  when: 個股跌破 30MA / 60MA（個股減倉樓梯）
  action: 目標倉 10% → 破 30MA 減至 8% → 破 60MA 減至 6% → 仍是持股中最弱 → 清倉。「我砍股票沒什麼情緒，該賣就賣」
  tickers: []
  window: 隨時（每檔皆適用）
  note: Lumentum 實例——破線清倉賣在 800–900「吐血」，但「按照紀律規定，該賣就賣」。右側交易：大部位絕不左側。
- id: rotation_csp
  when: 費半跌破 30 日均線、QQQ 未跌破——「市場用股價投票」
  action: 從半導體供應鏈搬部分資金回 CSP；買回 GOOGL、AMZN（「相對看好 Google 多於亞馬遜」，也可能選 NVDA）
  tickers:
  - GOOGL
  - AMZN
  - NVDA
  auto: rotation
  window: 隨時（作者明說「我可能會回去買」，現無持倉）
  note: 底層論述——2023 H 系列伺服器 2027–28 折舊到期，攤提結束後租出算力為純利；CAPEX YoY(~30%) < RPO YoY → 營業現金流轉正。RPO 具法律效力、不可取消。
- id: ter_earnings
  when: Teradyne 下半年財報不理想、股價回檔
  action: 逢弱分批建倉（事件型 3–9 月起，主線抱至 2027 CPO 放量）
  tickers:
  - TER
  window: 2026 H2 財報季
  note: WLT T2 CPO 測試機 70→200 台；Rubin GPU 測試搶 Advantest（10%→30%）；與宏捷在 Insertion 4 合作確認未變、台積電站點主導。
- id: optics_rebuy
  when: 光通訊財報催化——「催化劑應該是財報」證明需求（估值錨 LITE EPS $30 × 35 倍）
  action: 買回雷射光源廠（作者已砍 LITE/Nokia，帳上僅剩 COHR，「下半年我傾向找時機買回」）
  tickers:
  - LITE
  - COHR
  window: 2026 H2
  note: 1.6T 後 channel loss 物理極限 → 2028 全光；1.6T 光模組單價 ≈ 800G × 1.8。賣方報告有人給 50 倍，作者給 35 倍。
- id: nokia_rebuy
  when: Nokia 拿到 Amazon / xAI 標案（「明年很可能拿到 Amazon 訂單，拿 27 年訂單機會蠻大」；正積極擴廠備 Google 標案交貨）
  action: 買回 NOK（破線砍掉，非不看好——「我蠻喜歡的，但破線了」）
  tickers:
  - NOK
  window: 2026 H2–2027
  note: Nokimp 基板 28 年量產 on track。
- id: mlcc_expansion
  when: MLCC 廠宣布擴產（判斷 2027 年底前後「受不了」）
  action: P×Q 事件交易——擴產宣布前多輪漲價續抱，宣布後事件模式進出（3–9 月）
  tickers:
  - MRAAY
  - 2327.TW
  window: ~2027 年底
  note: 高階 MLCC 產能消耗 2.8–4 倍；Q3 產能轉移 10–20%、年底 ~20%。宣布擴產＝檢查點⑤切換事件模式。
- id: bb_validation
  when: 2027 下半年看到 Physical AI 量產驗證證據（Thor 晶片實際搭載出貨）
  action: 加碼 BB（現階段僅 ≤5% 選擇權倉）
  tickers:
  - BB
  window: 2027 H2–2028
  note: 2026-04-20 QNX×IGX Thor OS 級整合；每顆晶片付權利金；SAM 2029 ~59 億美元（未含 IGX 貢獻）vs 市值 60–70 億。
- id: tsmc_capex
  when: 台積電財報上修下半年 CAPEX（三年合計看 2,200 億美元）
  action: 設備股續抱加碼（AMAT/ONTO/UCTT/KLIC）；Intel、三星、海力士需求未進模型＝上修空間
  tickers:
  - AMAT
  - ONTO
  - ASML
  - UCTT
  - KLIC
  window: 2026 H2 財報季
  note: 無塵室是擴產瓶頸——UCTT 直接受惠。KLIC 已過台積電認證（SMPT 沒過）、MU/台積電已拉貨。
- id: delta_sic
  when: 台達電 SiC 供應鏈引入 Wolfspeed（Infineon 份額 90→70）獲更多驗證
  action: WOLF 觀察倉轉正式部位（配合 800V HVDC 2028 底滲透 10–20%）
  tickers:
  - WOLF
  - 2308.TW
  window: 2027–2028
  note: Wolfspeed 8 吋良率不錯；AI 伺服器轉型改善財務。
- id: valuation_trap
  when: 持股估值「無故」便宜 30–40%
  action: 不接刀——先加密 channel check（跌爛時一週做多次）找出你沒看到的利空；修正 10–20% 可忽略
  tickers: []
  window: 隨時
  note: 「估值變便宜了，我一定會先去看為什麼」「大盤歷史新高時有東西超便宜，我反而不敢買」。
- id: margin_peaking
  when: 記憶體/commodity 毛利率見頂下滑（如 MU 自 85% 明顯回落）
  action: 週期出場訊號——「margin peaking 我管你估值怎樣」；Broadcom 即為 margin peaking 案例
  tickers:
  - MU
  - SNDK
  - STX
  - WDC
  - AVGO
  window: 每季財報檢查
  note: commodity 玩的是 margin cycle；margin 下滑時任何估值倍數都沒有意義。
- id: memory_wall
  when: LLM 訓練架構解決「Transformer 記憶體牆」（省記憶體架構被實際導入產品）
  action: 記憶體需求反轉警訊——重新檢視整個記憶體部位
  tickers:
  - MU
  - SNDK
  - KXIAY
  window: 持續監控（技術部落格是垃圾，看實際產品導入）
  note: 「後續訓練架構改變才可能是需求反轉關鍵」。
- id: memory_ceiling
  when: 記憶體 LTA 天花板（~30%）壓縮漲幅、週期吸引力下降
  action: 不急著砍——等擴產宣布的 P×Q 放大效應；LTA 違約金已 100% + 第三方託管＝定價權仍強
  tickers:
  - MU
  - SNDK
  - STX
  - WDC
  - KXIAY
  window: 持續監控（檢查點⑥）
  note: 長約三至五年、鎖量+天花板價；矽晶圓因 HBM4 消耗翻倍進入去庫存循環。
