        weight: 0.30
        tickers: [MU, SNDK, STX, WDC, KXIAY]
        hold: 12–24月
        exit: HDD 報價 < $22/TB 或缺口收窄
      - name: MLCC
        theme_key: mlcc
        weight: 0.20
        tickers: [MRAAY, 2327.TW]
        hold: 12–18月
        exit: 提早擴產宣布或需求斷
      - name: 半導體設備
        theme_key: equipment
        weight: 0.18
        tickers: [AMAT, ONTO, ASML, UCTT, KLIC]
        hold: 6–12月
        exit: 台積電 CAPEX 指引下修
      - name: 台股核心
        theme_key: default
        weight: 0.17
        tickers: [2330.TW, 2454.TW]
        hold: 12–24月
        exit: 個股破季線且論述惡化
